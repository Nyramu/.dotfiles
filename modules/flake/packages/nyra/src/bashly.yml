name: nyra
help: Utility script for managing Nix
version: 1.7.0

commands:
- name: sync
  help: Synchronizes and rebuilds the system based on the config

  args:
  - name: config
    help: What config to use
    required: true
  
  examples:
  - nyra sync main
  - nyra sync potato


- name: update
  help: Updates the dotfiles' flake.lock (wrapper over nix flake update)
  examples:
  - nyra update


- name: clean
  help: Deletes unreachable store objects and generations older than 7 days (wrapper over nh clean)

  flags:
  - long: --delete-old 
    short: -d
    help: Deletes all old profiles

  examples:
  - nyra clean
  - nyra clean -d


- name: completions
  help: Loads completions in your shell


- name: android
  help: Mounts and unmounts the connected android device

  flags:
  - long: --unmount
    short: -u
    help: Unmounts the device from ~/Android

  examples:
  - nyra android
  - nyra android -u


- name: search
  help: Search packages from nixpkgs unstable (wrapper over nh search)

  args:
  - name: query
    help: Which package to search
    required: true
  
  examples:
  - nyra search [query]


- name: shell
  help: Test packages from nixpkgs in a dedicated shell (wrapper over nix shell)

  args:
  - name: packages
    help: Create a shell with the specified packages
    required: true
    repeatable: true

  examples:
  - nyra shell "[package1] ..."
